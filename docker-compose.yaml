services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      # Bound to the VPS's Tailscale IP only — not reachable from the public internet.
      # (Tailnet node hermes-distinguished-bingus = 100.87.219.33)
      - "100.87.219.33:8642:8642"   # gateway API (OpenAI-compatible; not enabled by default)
      - "100.87.219.33:9119:9119"   # web dashboard
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # Secrets are NOT stored here. Dashboard basic-auth (username/password/secret)
      # and the Nous Portal login live in /opt/data/.env + auth.json on the
      # persistent hermes-data volume, so redeploys never overwrite them.
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  hermes-data:
