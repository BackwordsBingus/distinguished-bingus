services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"   # gateway API (OpenAI-compatible)
      - "9119:9119"   # web dashboard (HERMES_DASHBOARD=1)
    volumes:
      - hermes-data:/opt/data
    environment:
      - HERMES_DASHBOARD=1
      - HERMES_DASHBOARD_HOST=0.0.0.0
      - HERMES_DASHBOARD_PORT=9119
      # Model provider key intentionally omitted — set later via the dashboard
      # or by redeploying with ANTHROPIC_API_KEY / OPENAI_API_KEY.
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

volumes:
  hermes-data:
